<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 1px solid gray;
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(2,50%);
            grid-template-rows: repeat(5,20%);
        }
        .box{
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <!-- types(fr, persent,auto,px,repeat) -->
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
