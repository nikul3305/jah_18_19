<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <style>
        h1:first-child{
            color:black;
            background-color: red;
        }
        h1:last-child{
            color:black;
            background-color: green;
        }
        p:first-of-type{
            color:black;
            background-color: blue;
        }
    </style>
</head>
<body>
<!--1.first child 2.last child 3.nth-child 4.first of type 5.last of type-->
<h1>Psuedo Class Selector</h1>
<div>
    <p>paragraph-1</p>
    <p>paragraph-2</p>
    <p>paragraph-3</p>
    <p>paragraph-4</p>
    <p>paragraph-5</p>
    <p>paragraph-6</p>
    <p>paragraph-7</p>
    <p>paragraph-8</p>
    <p>paragraph-9</p>
    <p>paragraph-10</p>
</div>

</body>
</html>
