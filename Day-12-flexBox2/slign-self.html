<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }
        .parent{
            height: 400px;
            width: 700px;
            background-color: aquamarine;
            border: 1px solid black;
            display: flex;
            justify-content: space-evenly;
            /* align-items: center; */
        }
        .child{
            border: 1px solid black;
            height: 100px;
            width: 120px;
            background-color: rgba(18, 54, 92, 0.463);
        }
        #child1{
            
            order: 5;
            align-self: flex-start;
        }
        #child2{
            order: 4;
        }
        #child3{
            order: 3;
            align-self: flex-end;
        }
        #child4{
            order: 2;
            align-self: center;
            
        }
        #child5{
            order: 1;
        }
    </style>
</head>
<body>
    <div class="parent">
       <div class="child" id="child1">child1</div>
       <div class="child" id="child2">child2</div>
       <div class="child" id="child3">child3</div>
       <div class="child" id="child4">child4</div>
       <div class="child" id="child5">child5</div>
    </div>
</body>
</html>
